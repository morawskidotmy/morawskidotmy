name: Update README

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install Pillow

      - name: Generate GIF badge
        run: python scripts/generate_gif.py

      - name: Build README
        run: python scripts/update_readme.py

      - name: Commit & push
        run: |
          git config user.name "readme-bot"
          git config user.email "actions@github.com"
          git add README.md gif.gif
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: daily readme update [skip ci]"
          git push
